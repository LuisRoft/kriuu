name: Keep Supabase active

on:
  schedule:
    # GitHub cron cannot express a rolling "every 6 days" interval. Run daily
    # and use the epoch-day check below to keep the interval exact across months.
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Decide whether today is a ping day
        id: schedule
        shell: bash
        run: |
          epoch_day=$(( $(date -u +%s) / 86400 ))

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || (( epoch_day % 6 == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Query Supabase
        if: steps.schedule.outputs.run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "Missing SUPABASE_URL or SUPABASE_PUBLISHABLE_KEY repository secret."
            exit 1
          fi

          # Validate the project URL and publishable key separately. This must
          # succeed, so an invalid secret does not get mistaken for an RLS denial.
          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --output /dev/null \
            --header "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            --header "Accept: application/json" \
            "${SUPABASE_URL%/}/rest/v1/"

          # Attempt a real table query. An anon role without a SELECT policy can
          # legitimately receive 401/403; the request still reaches Supabase and
          # serves the keep-alive purpose. Network and server errors still fail.
          status=$(curl --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --output /dev/null \
            --write-out "%{http_code}" \
            --header "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            --header "Accept: application/json" \
            "${SUPABASE_URL%/}/rest/v1/profiles?select=id&limit=1")

          case "$status" in
            2??|401|403)
              echo "Supabase responded to the database query (HTTP $status)."
              ;;
            *)
              echo "Unexpected response from Supabase (HTTP $status)."
              exit 1
              ;;
          esac
